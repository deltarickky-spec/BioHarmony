kind = "web"
previewPath = "/"
title = "BioHarmony Solutions"
version = "1.0.0"
id = "artifacts/bioharmony"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22202

[services.development]
run = "pnpm --filter @workspace/bioharmony run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bioharmony", "run", "build" ]
publicDir = "artifacts/bioharmony/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22202"
BASE_PATH = "/"
